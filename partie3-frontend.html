<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tâches bloquées</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f4f6f9;
        color: #1a1a2e;
        padding: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        color: #2d3a8c;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        max-width: 600px;
      }

      .search-bar select {
        padding: 0.5rem 0.75rem;
        border: 1px solid #c8cfe8;
        border-radius: 6px 0 0 6px;
        font-size: 0.95rem;
        background: #fff;
        color: #1a1a2e;
        outline: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      .search-bar input {
        flex: 1;
        padding: 0.5rem 0.75rem;
        border: 1px solid #c8cfe8;
        border-left: none;
        border-radius: 0 6px 6px 0;
        font-size: 0.95rem;
        background: #fff;
        color: #1a1a2e;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-bar select:focus,
      .search-bar input:focus {
        border-color: #2d3a8c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      }

      thead {
        background: #2d3a8c;
        color: #fff;
      }

      th, td {
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.9rem;
      }

      th { font-weight: 600; letter-spacing: 0.03em; }

      tbody tr:nth-child(even) { background: #f7f8fc; }
      tbody tr:hover { background: #eef0fb; }

      .priority-badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .priority-1 { background: #fde8e8; color: #c0392b; }
      .priority-2 { background: #fef3cd; color: #856404; }
      .priority-3 { background: #d4edda; color: #155724; }

      .empty-message {
        text-align: center;
        padding: 2rem;
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>

    <h1>Tâches bloquées</h1>

    <div class="search-bar">
      <select id="field-select" onchange="applyFilters()">
        <option value="all">Tous</option>
        <option value="name">Nom</option>
        <option value="project">Projet</option>
        <option value="priority">Priorité</option>
        <option value="block_reason">Raison</option>
      </select>
      <input
        type="text"
        id="search-input"
        placeholder="🔍 Rechercher…"
        oninput="applyFilters()"
      />
    </div>

    <table id="tasks-table">
      <thead>
        <tr>
          <th>Nom de la tâche</th>
          <th>Projet</th>
          <th>Priorité</th>
          <th>Raison du blocage</th>
        </tr>
      </thead>
      <tbody id="tasks-body">
        <!-- Rempli dynamiquement -->
      </tbody>
    </table>

    <!-- Importation du fichier scripts.js -->
    <script src="JS/scripts.js"></script>
  </body>
</html>
